<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buff Listesi | Takayi NRP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+JP:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0d13;
    --void-2:#0f141c;
    --panel:#131923e6;
    --ink:#e8ecf2;
    --ink-dim:#9aa5b4;
    --line:#2a3441;

    --low:#3fa7d6;
    --low-dim:#1c3a4a;
    --mid:#8b6bff;
    --mid-dim:#2a2149;
    --high:#ff5c5c;
    --high-dim:#3a1a1e;
    --extreme:#ff9a1f;
    --extreme-dim:#3d2308;
    --gold:#f2b705;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--void);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
  }
  ::selection{background:var(--gold);color:#1a1305;}

  /* ---------- NAV ---------- */
  .nav{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:16px 20px;
    background:linear-gradient(180deg, rgba(10,13,19,.97), rgba(10,13,19,.9));
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(6px);
    flex-wrap:wrap;
  }
  .nav a{
    color:var(--ink-dim);
    text-decoration:none;
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.05em;
    padding:9px 18px;
    border-radius:999px;
    border:1px solid transparent;
    transition:all .25s;
  }
  .nav a:hover{color:var(--ink);border-color:var(--line);}
  .nav a.active{
    color:#0a0d13;
    background:linear-gradient(135deg,var(--gold),var(--extreme));
    box-shadow:0 0 20px -4px var(--extreme);
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:90px 20px 70px;
    text-align:center;
    overflow:hidden;
    isolation:isolate;
  }
  .hero::before{
    content:"";
    position:absolute;inset:-20%;
    z-index:-2;
    background:
      radial-gradient(circle at 18% 30%, #16324a55, transparent 55%),
      radial-gradient(circle at 82% 20%, #3a144055, transparent 55%),
      radial-gradient(circle at 50% 90%, #2b0f0855, transparent 60%);
  }
  .chakra-ring{
    position:absolute; z-index:-1; top:50%; left:50%;
    width:640px; height:640px; transform:translate(-50%,-55%);
    border-radius:50%;
    border:1px solid #ffffff14;
    animation:spin 40s linear infinite;
  }
  .chakra-ring::before,.chakra-ring::after{
    content:"";position:absolute;inset:60px;border-radius:50%;
    border:1px solid #ffffff10;
  }
  .chakra-ring::after{inset:120px;border-color:#ffffff0d;}
  @keyframes spin{to{transform:translate(-50%,-55%) rotate(360deg);}}

  .eyebrow{
    font-family:'Noto Sans JP',sans-serif;
    font-size:13px;letter-spacing:.3em;color:var(--extreme);
    text-transform:uppercase;margin-bottom:14px;
  }
  .hero h1{
    font-family:'Cinzel',serif;
    font-weight:900;
    font-size:clamp(42px,7vw,76px);
    margin:0;
    background:linear-gradient(135deg,#fff 20%, var(--gold) 55%, var(--extreme) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:.02em;
  }
  .hero p{
    color:var(--ink-dim); max-width:560px; margin:18px auto 0;
    font-size:15.5px; line-height:1.7;
  }

  /* ---------- CONTROLS ---------- */
  .controls{
    position:sticky; top:70px; z-index:40;
    max-width:1100px; margin:0 auto 10px; padding:18px 22px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    backdrop-filter:blur(10px);
  }
  .controls-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;}
  .tier-tabs{display:flex;flex-wrap:wrap;gap:8px;}
  .tier-tabs button{
    font-family:'Cinzel',serif; font-weight:700; font-size:12.5px;
    letter-spacing:.04em; color:var(--ink-dim);
    background:#ffffff08; border:1px solid var(--line);
    padding:9px 16px; border-radius:10px; cursor:pointer;
    transition:all .2s;
  }
  .tier-tabs button:hover{color:var(--ink); border-color:#ffffff30;}
  .tier-tabs button.active[data-tier="all"]{background:#ffffff1a;color:#fff;border-color:#ffffff40;}
  .tier-tabs button.active[data-tier="low"]{background:var(--low-dim);color:var(--low);border-color:var(--low);}
  .tier-tabs button.active[data-tier="mid"]{background:var(--mid-dim);color:var(--mid);border-color:var(--mid);}
  .tier-tabs button.active[data-tier="high"]{background:var(--high-dim);color:var(--high);border-color:var(--high);}
  .tier-tabs button.active[data-tier="extreme"]{background:var(--extreme-dim);color:var(--extreme);border-color:var(--extreme);}
  .tier-tabs button.active[data-tier="klan"]{background:#2a1e3d;color:#c9a6ff;border-color:#c9a6ff;}
  .tier-tabs button.active[data-tier="diger"]{background:#1e2a2a;color:#7fd6c4;border-color:#7fd6c4;}

  .search-wrap{position:relative;}
  .search-wrap input{
    width:230px; max-width:60vw;
    background:#00000040; border:1px solid var(--line); color:var(--ink);
    padding:10px 14px 10px 36px; border-radius:10px; font-size:13.5px;
    font-family:'Inter',sans-serif;
  }
  .search-wrap input:focus{outline:2px solid var(--gold); outline-offset:1px;}
  .search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.5;}

  /* ---------- TIER SECTIONS ---------- */
  .tier-section{
    position:relative;
    padding:64px 20px 30px;
    scroll-margin-top:150px;
    overflow:hidden;
  }
  .tier-section::before{
    content:"";
    position:absolute; inset:0; z-index:-1;
    opacity:.55;
  }
  .tier-section[data-tier="low"]::before{
    background:
      radial-gradient(ellipse 900px 500px at 15% 0%, var(--low-dim), transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 40%, #123, transparent 60%);
  }
  .tier-section[data-tier="mid"]::before{
    background:
      radial-gradient(ellipse 900px 500px at 85% 10%, var(--mid-dim), transparent 60%),
      radial-gradient(ellipse 700px 500px at 10% 60%, #1c1530, transparent 60%);
  }
  .tier-section[data-tier="high"]::before{
    background:
      radial-gradient(ellipse 900px 550px at 20% 0%, var(--high-dim), transparent 60%),
      radial-gradient(ellipse 800px 500px at 95% 60%, #2a0d10, transparent 60%);
  }
  .tier-section[data-tier="extreme"]::before{
    background:
      radial-gradient(ellipse 1000px 600px at 50% -10%, var(--extreme-dim), transparent 65%),
      radial-gradient(ellipse 700px 500px at 90% 80%, #3a1206, transparent 60%);
  }
  .tier-section[data-tier="klan"]::before{
    background: radial-gradient(ellipse 900px 500px at 50% 0%, #241a38, transparent 65%);
  }
  .tier-section[data-tier="diger"]::before{
    background: radial-gradient(ellipse 900px 500px at 50% 0%, #14231f, transparent 65%);
  }

  .tier-head{
    max-width:1100px;margin:0 auto 26px; display:flex; align-items:baseline; gap:16px;
    border-bottom:1px solid var(--line); padding-bottom:16px;
  }
  .tier-head h2{
    font-family:'Cinzel',serif; font-weight:900; font-size:30px; margin:0;
    letter-spacing:.06em; text-transform:uppercase;
  }
  .tier-section[data-tier="low"] .tier-head h2{color:var(--low);}
  .tier-section[data-tier="mid"] .tier-head h2{color:var(--mid);}
  .tier-section[data-tier="high"] .tier-head h2{color:var(--high);}
  .tier-section[data-tier="extreme"] .tier-head h2{color:var(--extreme);}
  .tier-section[data-tier="klan"] .tier-head h2{color:#c9a6ff;}
  .tier-section[data-tier="diger"] .tier-head h2{color:#7fd6c4;}
  .tier-head .kanji{font-family:'Noto Sans JP',sans-serif; font-size:20px; color:var(--ink-dim);}

  .grid{
    max-width:1100px; margin:0 auto; display:grid;
    grid-template-columns:repeat(3,1fr); gap:18px; padding-bottom:24px;
  }
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:620px){.grid{grid-template-columns:1fr;}}

  .card{
    background:linear-gradient(180deg,#151c26cc,#10151dcc);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px;
    display:flex; flex-direction:column; gap:12px;
    opacity:0; transform:translateY(16px);
    animation:rise .5s ease forwards;
    transition:border-color .25s, transform .25s;
  }
  .card:hover{transform:translateY(-3px);}
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  .tier-section[data-tier="low"] .card:hover{border-color:var(--low);}
  .tier-section[data-tier="mid"] .card:hover{border-color:var(--mid);}
  .tier-section[data-tier="high"] .card:hover{border-color:var(--high);}
  .tier-section[data-tier="extreme"] .card:hover{border-color:var(--extreme);}

  .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .card-title{display:flex; align-items:center; gap:10px;}
  .icon{
    width:38px;height:38px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:19px; flex:none;
    background:#ffffff0d; border:1px solid var(--line);
  }
  .name-wrap .kanji-small{font-family:'Noto Sans JP',sans-serif;font-size:11.5px;color:var(--ink-dim);display:block;}
  .name-wrap .name{font-weight:700; font-size:15px; line-height:1.25;}

  .badge{
    font-family:'Cinzel',serif; font-weight:700; font-size:10.5px;
    padding:4px 10px; border-radius:999px; white-space:nowrap; height:fit-content;
  }
  .tier-section[data-tier="low"] .badge{background:var(--low-dim); color:var(--low);}
  .tier-section[data-tier="mid"] .badge{background:var(--mid-dim); color:var(--mid);}
  .tier-section[data-tier="high"] .badge{background:var(--high-dim); color:var(--high);}
  .tier-section[data-tier="extreme"] .badge{background:var(--extreme-dim); color:var(--extreme);}

  .desc{font-size:13px; line-height:1.6; color:#c7cedb; flex:1;}

  .bp{
    font-family:'Cinzel',serif; font-weight:700; font-size:12.5px; color:var(--gold);
    display:flex;align-items:center;gap:6px;
  }

  .kontenjan{margin-top:auto;}
  .kontenjan-label{display:flex; justify-content:space-between; font-size:11px; color:var(--ink-dim); margin-bottom:6px;}
  .kontenjan-bar{height:6px; border-radius:999px; background:#ffffff10; overflow:hidden;}
  .kontenjan-fill{height:100%; border-radius:999px;}
  .tier-section[data-tier="low"] .kontenjan-fill{background:var(--low);}
  .tier-section[data-tier="mid"] .kontenjan-fill{background:var(--mid);}
  .tier-section[data-tier="high"] .kontenjan-fill{background:var(--high);}
  .tier-section[data-tier="extreme"] .kontenjan-fill{background:var(--extreme);}
  .kontenjan-fill.full{background:#666 !important;}
  .tag-full{color:#ff6b6b; font-weight:700;}
  .tag-unlimited{color:#7fd6c4; font-weight:700;}

  .empty-state{
    max-width:1100px;margin:0 auto; padding:40px 20px; text-align:center;
    color:var(--ink-dim); font-size:14px; border:1px dashed var(--line); border-radius:16px;
  }

  .foot-note{
    max-width:1100px; margin:20px auto 60px; padding:16px 20px;
    border:1px solid var(--line); border-radius:14px;
    background:#ffffff06; color:var(--ink-dim); font-size:12.5px; line-height:1.7;
  }
  .foot-note b{color:var(--ink);}

  .hidden{display:none !important;}
</style>
</head>
<body>

  <nav class="nav">
    <a href="#" class="active">⚡ Takayi NRP · Bufflar</a>
  </nav>

  <header class="hero">
    <div class="chakra-ring"></div>
    <div class="eyebrow">力 · 権能 · 継承</div>
    <h1>Buff Listesi</h1>
    <p>Karakterinin gücünü şekillendirecek yetenekleri keşfet. Her buffun bir BP (Buff Puanı) maliyeti ve sınırlı kontenjanı vardır — erken davran.</p>
  </header>

  <div class="controls">
    <div class="controls-row">
      <div class="tier-tabs" id="tierTabs">
        <button data-tier="all" class="active">Tümü</button>
        <button data-tier="low">Low</button>
        <button data-tier="mid">Mid</button>
        <button data-tier="high">High</button>
        <button data-tier="extreme">Extreme</button>
      </div>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="buffSearch" placeholder="Buff ara...">
      </div>
    </div>
  </div>

  <main id="sections"></main>

<script>
/* ==========================================================================
   BUFF VERİLERİ
   --------------------------------------------------------------------------
   Her buffun "kontenjan" değeri: kaç kişinin bu buffu alabileceğini belirtir.

   - dolu: sayı       -> şu an dolu olan kısım (örn. 1 kişi almış)
   - kontenjan: null  -> SINIRSIZ demektir (herkes alabilir)

   >>> KONTENJANLARI DÜZENLEMEK İÇİN SADECE AŞAĞIDAKİ SAYILARI DEĞİŞTİR. <<<
   Her buffun yanında kontenjan / dolu alanları var, örn:

  high: {

      { icon:"🗺️", kanji:"領域制圧", name:"Alansal Üstünlük", bp:"88 BP", desc:"Alındığı alanı pasif olarak 1 üst rank gücüne taşır.", kontenjan:7, dolu:0 },

      { icon:"🌀", kanji:"チャクラ吸収", name:"Chakra Absorbation", bp:"100 BP", desc:"Rakip tekniklerinin chakrasını emerek etkisiz hale getirme yeteneği.", kontenjan:2, dolu:0 },

/* ========================== RENDER ========================== */
const sectionsEl = document.getElementById('sections');

function renderAll(){
  sectionsEl.innerHTML = '';
  Object.entries(data).forEach(([tier, group])=>{
    const section = document.createElement('section');
    section.className = 'tier-section';
    section.dataset.tier = tier;
    section.id = 'tier-' + tier;

    const head = document.createElement('div');
    head.className = 'tier-head';
    head.innerHTML = `<h2>${group.title}</h2><span class="kanji">${group.kanji}</span>`;
    section.appendChild(head);

    if(group.items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'Bu kategoriye henüz buff eklenmedi.';
      section.appendChild(empty);
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid';
      group.items.forEach((item, i)=>{
        grid.appendChild(buildCard(item, i));
      });
      section.appendChild(grid);
    }

    if(group.items.some(i => i.note)){
      const foot = document.createElement('div');
      foot.className = 'foot-note';
      group.items.filter(i=>i.note).forEach(i=>{
        foot.innerHTML += `<b>${i.name}:</b> ${i.note}<br>`;
      });
      section.appendChild(foot);
    }

    sectionsEl.appendChild(section);
  });
}

function buildCard(item, i){
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = (i * 0.05) + 's';
  card.dataset.name = item.name.toLowerCase();

  let kontenjanHtml = '';
  if(item.kontenjan === null){
    kontenjanHtml = `<div class="kontenjan-label"><span>Kontenjan</span><span class="tag-unlimited">SINIRSIZ</span></div>`;
  } else {
    const dolu = item.dolu || 0;
    const pct = Math.min(100, Math.round((dolu / item.kontenjan) * 100));
    const isFull = dolu >= item.kontenjan;
    kontenjanHtml = `
      <div class="kontenjan-label">
        <span>Kontenjan ${dolu}/${item.kontenjan}</span>
        <span class="${isFull ? 'tag-full' : ''}">${isFull ? 'DOLU' : ''}</span>
      </div>
      <div class="kontenjan-bar"><div class="kontenjan-fill ${isFull ? 'full' : ''}" style="width:${pct}%"></div></div>
    `;
  }

  card.innerHTML = `
    <div class="card-top">
      <div class="card-title">
        <div class="icon">${item.icon}</div>
        <div class="name-wrap">
          <span class="kanji-small">${item.kanji || ''}</span>
          <span class="name">${item.name}</span>
        </div>
      </div>
      <span class="badge">${item.bp}</span>
    </div>
    <div class="desc">${item.desc}</div>
    <div class="kontenjan">${kontenjanHtml}</div>
  `;
  return card;
}

renderAll();

/* ========================== FİLTRE + ARAMA ========================== */
const tabs = document.querySelectorAll('#tierTabs button');
tabs.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabs.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tier = btn.dataset.tier;
    document.querySelectorAll('.tier-section').forEach(sec=>{
      sec.classList.toggle('hidden', tier !== 'all' && sec.dataset.tier !== tier);
    });
    if(tier !== 'all'){
      document.getElementById('tier-' + tier).scrollIntoView({behavior:'smooth', block:'start'});
    }
  });
});

document.getElementById('buffSearch').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card=>{
    card.style.display = card.dataset.name.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.tier-section').forEach(sec=>{
    const visibleCards = sec.querySelectorAll('.card:not([style*="display: none"])').length;
    const hasEmptyState = sec.querySelector('.empty-state');
    if(!hasEmptyState){
      sec.style.display = (q && visibleCards === 0) ? 'none' : '';
    }
  });
});
</script>
